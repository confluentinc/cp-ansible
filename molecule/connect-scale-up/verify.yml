### connect-scale-up verify
## Verifies whether newly added node is
## - Added to the cluster
## - Added to corresponding logical Connect cluster (ssl)
## - Added to the property file of control center
---
- name: Verify - kafka_controller
  hosts: kafka_controller
  gather_facts: false
  tasks:
    - import_role:
        name: variables
    - import_role:
        name: confluent.test
        tasks_from: check_property.yml
      vars:
        file_path: /etc/controller/server.properties
        property: controller.quorum.voters
        expected_value: "{{ kafka_controller_quorum_voters }}"
    - import_role:
        name: confluent.test
        tasks_from: check_property.yml
      vars:
        file_path: /etc/controller/server.properties
        property: process.roles
        expected_value: controller
    - import_role:
        name: confluent.test
        tasks_from: check_property.yml
      vars:
        file_path: /etc/controller/server.properties
        property: listeners
        expected_value: "{{kafka_controller_listeners['controller']['name']}}://:{{kafka_controller_listeners['controller']['port']}}"


- name: Verify - kafka_connect2
  hosts: kafka-connect2
  gather_facts: false
  tasks:
    - name: Check line properties file
      import_role:
        name: confluent.test
        tasks_from: check_property.yml
      vars:
        file_path: /etc/kafka/connect-distributed.properties
        property: group.id
        expected_value: connect-cluster1

    - name: Get Connectors on connect cluster2
      uri:
        url: "http://kafka-connect2:8083/connectors"
        status_code: 200
        validate_certs: false
      register: connectors

    - name: Assert Connector Created
      assert:
        that:
          - connectors.json[0] == "sample-connector-1"
        fail_msg: "Connector not created"
        quiet: true

- name: Verify - kafka_connect1
  hosts: kafka-connect1
  gather_facts: false
  tasks:
    - name: Check line properties file
      import_role:
        name: confluent.test
        tasks_from: check_property.yml
      vars:
        file_path: /etc/kafka/connect-distributed.properties
        property: group.id
        expected_value: connect-ssl

    - name: Get Connectors on connect cluster1
      uri:
        url: "https://kafka-connect1:8083/connectors"
        status_code: 200
        validate_certs: false
        client_cert: /var/ssl/private/kafka_connect.crt
        client_key: /var/ssl/private/kafka_connect.key
      register: connectors

    - name: Assert Connector Created
      assert:
        that:
          - connectors.json[0] == "sample-connector-ssl"
        fail_msg: "Connector not created"
        quiet: true

- name: Verify - kafka_connect4
  hosts: kafka-connect4
  gather_facts: false
  tasks:
    - name: Check line properties file
      import_role:
        name: confluent.test
        tasks_from: check_property.yml
      vars:
        file_path: /etc/kafka/connect-distributed.properties
        property: group.id
        expected_value: connect-ssl
    - name: Get Connectors on connect cluster4
      uri:
        url: "https://kafka-connect4:8083/connectors"
        status_code: 200
        validate_certs: false
        client_cert: /var/ssl/private/kafka_connect.crt
        client_key: /var/ssl/private/kafka_connect.key
      register: connectors
    - name: Assert Connector Created
      assert:
        that:
          - connectors.json[0] == "sample-connector-ssl"
        fail_msg: "Connector not created"
        quiet: true
    - name: Get connectors details to verify connect4 is part of the cluster
      uri:
        url: "https://kafka-connect4:8083/connectors?expand=status"
        status_code: 200
        validate_certs: false
        client_cert: /var/ssl/private/kafka_connect.crt
        client_key: /var/ssl/private/kafka_connect.key
      register: connect_cluster_response
    - name: Show the Status response
      debug:
        msg: '{{ connect_cluster_response.json["sample-connector-ssl"].status.tasks }}'
    - set_fact:
        hosts_connect4: '{{ connect_cluster_response.json["sample-connector-ssl"].status.tasks | map(attribute="worker_id") | map("regex_search",".*connect4.*") | select("string") | list  }}'
    - name: Assert that there are hosts with connect4 name in workers list
      assert:
        that: "hosts_connect4 | length > 0"
        fail_msg: "There should be at least one host with name kafka-connect4 in ssl cluster"

- name: Verify - control_center_next_gen
  hosts: control_center_next_gen
  gather_facts: false
  tasks:
    - name: Check line connect cluster cluster1
      import_role:
        name: confluent.test
        tasks_from: check_property.yml
      vars:
        file_path: /etc/confluent-control-center/control-center-production.properties
        property: confluent.controlcenter.connect.connect-cluster1.cluster
        expected_value: http://kafka-connect2:8083

    - name: Check line connect cluster ssl
      import_role:
        name: confluent.test
        tasks_from: check_property.yml
      vars:
        file_path: /etc/confluent-control-center/control-center-production.properties
        property: confluent.controlcenter.connect.connect-ssl.cluster
        expected_value: https://kafka-connect1:8083,https://kafka-connect4:8083

- name: Verify - USM Agent Functionality
  import_playbook: ../verify_usm_agent.yml

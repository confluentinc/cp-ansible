---
### Installation of Confluent Platform on Ubuntu2404.
### MTLS enabled.
### Modified to test customer ZK to KRaft migration scenario

driver:
  name: docker
platforms:
  - name: ${KRAFT_CONTROLLER:-zookeeper}1
    hostname: ${KRAFT_CONTROLLER:-zookeeper}1.confluent
    groups:
      - ${CONTROLLER_HOSTGROUP:-zookeeper}
      - ${CONTROLLER_HOSTGROUP:-zookeeper}_migration
    image: geerlingguy/docker-ubuntu2404-ansible
    dockerfile: ../Dockerfile-ubuntu.j2
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    networks:
      - name: confluent
  - name: kafka-broker1
    hostname: kafka-broker1.confluent
    groups:
      - kafka_broker
      - kafka_broker_migration
    image: geerlingguy/docker-ubuntu2404-ansible
    dockerfile: ../Dockerfile-ubuntu.j2
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    networks:
      - name: confluent
  - name: kafka-broker2
    hostname: kafka-broker2.confluent
    groups:
      - kafka_broker
      - kafka_broker_migration
    image: geerlingguy/docker-ubuntu2404-ansible
    dockerfile: ../Dockerfile-ubuntu.j2
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    networks:
      - name: confluent
  - name: kafka-broker3
    hostname: kafka-broker3.confluent
    groups:
      - kafka_broker
      - kafka_broker_migration
    image: geerlingguy/docker-ubuntu2404-ansible
    dockerfile: ../Dockerfile-ubuntu.j2
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    networks:
      - name: confluent
  - name: schema-registry1
    hostname: schema-registry1.confluent
    groups:
      - schema_registry
      - schema_registry_migration
    image: geerlingguy/docker-ubuntu2404-ansible
    dockerfile: ../Dockerfile-ubuntu.j2
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    networks:
      - name: confluent
  - name: kafka-rest1
    hostname: kafka-rest1.confluent
    groups:
      - kafka_rest
      - kafka_rest_migration
    image: geerlingguy/docker-ubuntu2404-ansible
    dockerfile: ../Dockerfile-ubuntu.j2
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    networks:
      - name: confluent
  - name: kafka-connect1
    hostname: kafka-connect1.confluent
    groups:
      - kafka_connect
      - kafka_connect_migration
    image: geerlingguy/docker-ubuntu2404-ansible
    dockerfile: ../Dockerfile-ubuntu.j2
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    networks:
      - name: confluent
  - name: ksql1
    hostname: ksql1.confluent
    groups:
      - ksql
      - ksql_migration
    image: geerlingguy/docker-ubuntu2404-ansible
    dockerfile: ../Dockerfile-ubuntu.j2
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    networks:
      - name: confluent
  - name: control-center1
    hostname: control-center1.confluent
    groups:
      - control_center
      - control_center_migration
    image: geerlingguy/docker-ubuntu2404-ansible
    dockerfile: ../Dockerfile-ubuntu.j2
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    published_ports:
      - "9021:9021"
    networks:
      - name: confluent
  - name: control-center-next-gen
    hostname: control-center-next-gen.confluent
    groups:
      - control_center_next_gen
      - control_center_next_gen_migration
    image: geerlingguy/docker-ubuntu2404-ansible
    dockerfile: ../Dockerfile-ubuntu.j2
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    published_ports:
      - "9022:9022"
    networks:
      - name: confluent
      # Cluster 2 (Kraft) goups, groupnames will be changed during converge phase
  - name: controller1-mig
    hostname: controller1-mig.confluent
    groups:
      - kafka_controller_migration
    image: geerlingguy/docker-ubuntu2404-ansible
    dockerfile: ../Dockerfile-ubuntu.j2
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    networks:
      - name: confluent
  - name: usm-agent1
    hostname: usm-agent1.confluent
    groups:
      - usm_agent
    image: geerlingguy/docker-ubuntu2404-ansible
    dockerfile: ../Dockerfile-ubuntu-java21.j2
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    networks:
      - name: confluent
  - name: ccloud-mock-service
    hostname: ccloud-mock-service.confluent
    groups:
      - ccloud_mock
    image: usmagent-mock-ccloud:latest
    pre_build_image: true
    command: ""
    published_ports:
      - "8081:8081"
    networks:
      - name: confluent
    env:
      MOCK_SERVER_HOST: "0.0.0.0"
      MOCK_SERVER_PORT: "8081"
      MOCK_SERVER_USE_TLS: "false"
      MOCK_SERVER_REQUIRE_BASIC_AUTH: "true"
      MOCK_SERVER_USERNAME: "ccloud-user"
      MOCK_SERVER_PASSWORD: "ccloud-secret"
      MOCK_SERVER_REQUIRE_MTLS: "false"
provisioner:
  playbooks:
    converge: ${MIGRATION_CONVERGE:-../collections_converge.yml}
  inventory:
    host_vars:
      ccloud-mock-service:
        ansible_connection: local
        gather_facts: false
      usm-agent1:
        usm_agent_custom_properties:
          confluent.usm-agent.ccloud.ssl.enabled: "false"
        usm_agent_health_check_enabled: false
    group_vars:
      all:
        jolokia_enabled: true
        control_center_next_gen_port: 9022
        control_center_next_gen_dependency_prometheus_ssl_enabled: true
        control_center_next_gen_dependency_prometheus_mtls_enabled: false
        control_center_next_gen_dependency_prometheus_basic_auth_enabled: false
        control_center_next_gen_dependency_alertmanager_ssl_enabled: true
        control_center_next_gen_dependency_alertmanager_mtls_enabled: false
        control_center_next_gen_dependency_alertmanager_basic_auth_enabled: true

        ssl_enabled: true
        ssl_mutual_auth_enabled: true
        secrets_protection_enabled: true # To test secrets protection on cli v3 without rbac
        kafka_controller_jolokia_enabled: true
        kafka_controller_jolokia_ssl_enabled: true
        kafka_broker_jolokia_enabled: true
        kafka_broker_jolokia_ssl_enabled: true
        jolokia_access_control_enabled: true
        kafka_controller_jolokia_access_control_custom_file_enabled: false
        kafka_broker_jolokia_access_control_custom_file_enabled: true
        kafka_broker_jolokia_access_control_file_src_path: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/molecule/mtls-ubuntu/jolokia_access_test.xml"
        schema_registry_jolokia_auth_mode: "basic"
        schema_registry_jolokia_user: "user1"
        schema_registry_jolokia_password: "pass"
        kafka_connect_jolokia_enabled: true
        kafka_connect_jolokia_ssl_enabled: true
        kafka_connect_jolokia_access_control_enabled: false

        # USM Agent Configuration - mTLS
        usm_agent_basic_auth_enabled: false
        usm_agent_ssl_enabled: true
        usm_agent_ssl_mutual_auth_enabled: true

        # USM Agent Configuration - CCloud Mock Server
        ccloud_endpoint: http://ccloud-mock-service:8081
        ccloud_environment_id: env-mock-123
        ccloud_credential:
          username: ccloud-user
          password: ccloud-secret

        # ============================================================
        # CUSTOMER CONFIGURATION VARS - Testing ZK to KRaft Migration
        # ============================================================

        # Controller SSL settings (from customer inventory)
        kafka_controller_ssl_enabled: true
        kafka_controller_ssl_mutual_auth_enabled: true
        kafka_controller_ssl_client_authentication: required
        kafka_controller_port: 9095  # FIXED: Changed from 9094 to avoid port conflict

        # Authentication types (from customer inventory)
        zookeeper_quorum_authentication_type: mtls
        kafka_broker_rest_proxy_authentication_type: mtls
        schema_registry_authentication_type: mtls
        kafka_connect_authentication_type: mtls
        kafka_rest_authentication_type: mtls
        ksql_authentication_type: mtls
        control_center_authentication_type: mtls



        # Debugging
        no_log: false
        mask_secrets: false

      # ============================================================
      # KAFKA CONTROLLER GROUP VARS (from customer inventory)
      # ============================================================
      kafka_controller:
        kafka_controller_custom_properties:
          authorizer.class.name: org.apache.kafka.metadata.authorizer.StandardAuthorizer

      # ============================================================
      # ZOOKEEPER GROUP VARS (from customer inventory)
      # ============================================================
      zookeeper:
        zookeeper_custom_properties:
          zookeeper.set.acl: "true"

      # ============================================================
      # KAFKA BROKER GROUP VARS (from customer inventory)
      # ============================================================
      kafka_broker:
        # NOTE: Removed kafka_broker_disable_auto_generated_properties: true
        # This was causing the broker to not generate proper listener configs

        kafka_broker_custom_properties:
          # JBOD from original molecule + customer properties
          log.dirs: /var/lib/kafka/data1,/var/lib/kafka/data2,/var/lib/kafka/data3
          authorizer.class.name: org.apache.kafka.metadata.authorizer.StandardAuthorizer
          super.users: "User:kafka"
          # NOTE: Principal mapping rules removed for molecule test
          # In customer inventory, use: ssl.principal.mapping.rules: "RULE:^CN=([a-zA-Z.0-9@-]+).*$$/$$1/,DEFAULT"
          # (escape $ as $$ in molecule files)
          sasl.enabled.mechanisms: PLAIN,SCRAM-SHA-256,SCRAM-SHA-512
          # NOTE: Removed incorrect listener.security.protocol.map
          # NOTE: Removed manual advertised.listeners - let CP-Ansible generate

        # Custom listeners (from customer inventory) - FIXED port alignment
        kafka_broker_custom_listeners:
          client_listener:
            name: CLIENT_SASL
            port: 9093
            ssl_enabled: false
            ssl_mutual_auth_enabled: false
            sasl_protocol: plain

          client_mtls_listener:
            name: CLIENT_MTLS
            port: 9094  # FIXED: Now controller uses 9095, so 9094 is free
            ssl_enabled: true
            ssl_mutual_auth_enabled: true
            sasl_protocol: none

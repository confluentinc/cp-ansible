---
# SEC-04: Upgrade + Customer-Provided Key
#
# This test validates that customer-provided master keys are preserved during upgrades
# with serial deployment strategy.
#
# Expected behavior:
#   - First run: Customer's key used
#   - Second run (serial): SAME customer key preserved
#   - No divergence, no regeneration

dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: kafka-broker1.confluent
    hostname: kafka-broker1.confluent
    image: geerlingguy/docker-ubuntu1804-ansible:latest
    dockerfile: ../Dockerfile-ubuntu.j2
    privileged: true
    command: /lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    groups:
      - kafka_broker
    networks:
      - name: confluent

  - name: kafka-broker2.confluent
    hostname: kafka-broker2.confluent
    image: geerlingguy/docker-ubuntu1804-ansible:latest
    dockerfile: ../Dockerfile-ubuntu.j2
    privileged: true
    command: /lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    groups:
      - kafka_broker
    networks:
      - name: confluent

  - name: kafka-broker3.confluent
    hostname: kafka-broker3.confluent
    image: geerlingguy/docker-ubuntu1804-ansible:latest
    dockerfile: ../Dockerfile-ubuntu.j2
    privileged: true
    command: /lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    groups:
      - kafka_broker
    networks:
      - name: confluent

provisioner:
  name: ansible
  config_options:
    defaults:
      hash_behaviour: merge
  inventory:
    group_vars:
      all:
        scenario_name: secrets-upgrade-customer

        installation_method: package
        confluent_server_enabled: true

        # Secrets Protection Configuration with CUSTOMER KEY
        secrets_protection_enabled: true
        regenerate_masterkey: false  # Customer-provided key
        secrets_protection_masterkey: "Y3VzdG9tZXIta2V5LXVwZ3JhZGUtYWJjMTIz"  # Customer's key

        # SSL Configuration
        ssl_enabled: false
        ssl_mutual_auth_enabled: false

        # SASL Configuration
        sasl_protocol: none

        # Kafka Configuration
        kafka_broker_custom_properties:
          num.partitions: 1
          default.replication.factor: 1
          min.insync.replicas: 1
          offsets.topic.replication.factor: 1

        kafka_broker_log_dirs:
          - /var/lib/kafka
  playbooks:
    converge: converge.yml
    verify: verify.yml

verifier:
  name: ansible

scenario:
  name: secrets-upgrade-customer
  # CRITICAL TEST SEQUENCE:
  # 1. First converge = fresh install (parallel deployment)
  # 2. First verify = validate customer key used
  # 3. Second converge = upgrade (serial deployment)
  # 4. Second verify = validate customer key PRESERVED
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge  # Run 1: Fresh install (parallel)
    - verify    # Verify Run 1: Customer key used
    - converge  # Run 2: Upgrade (serial) - CRITICAL TEST
    - verify    # Verify Run 2: Customer key PRESERVED
    - cleanup
    - destroy

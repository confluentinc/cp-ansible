---
# SEC-04 Converge: Upgrade + Customer-Provided Key
#
# This playbook will be run TWICE:
# - First run: Fresh install with customer key (parallel deployment)
# - Second run: Upgrade with customer key (serial deployment)
#
# Tests that customer key is preserved through upgrades.

- name: Include variables role for all hosts
  hosts: all
  gather_facts: false
  tasks:
    - name: Include variables role
      include_role:
        name: confluent.platform.variables

- name: Include common role
  hosts: all
  gather_facts: false
  tasks:
    - name: Include common role
      include_role:
        name: confluent.platform.common

- name: Deploy Kafka Broker with Secrets Protection
  import_playbook: ../../playbooks/kafka_broker.yml

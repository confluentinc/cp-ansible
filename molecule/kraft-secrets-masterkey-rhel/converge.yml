---
### Three-phase converge:
### 1. Deploy the KRaft cluster with secrets protection — masterkey auto-generated (key A).
### 2. Full rolling restart — regenerate_masterkey generates a new key (key B). During the roll,
###    brokers get key B one at a time. Mid-roll, some brokers have key A and some have key B.
###    get_meta_properties must read each broker's own override.conf for the correct key.
### 3. Re-run to confirm idempotency after key rotation.

- name: "Phase 1: initial deploy — masterkey auto-generated"
  import_playbook: confluent.platform.all

- name: "Phase 2 prep: enable rolling deployment strategy for the re-run"
  hosts: all
  gather_facts: false
  tasks:
    - name: Set rolling deployment strategy
      set_fact:
        deployment_strategy: rolling

- name: "Phase 2: full rolling restart — new masterkey generated, keys diverge mid-roll"
  import_playbook: confluent.platform.all

- name: "Phase 3: re-run to confirm idempotency after key rotation"
  import_playbook: confluent.platform.all

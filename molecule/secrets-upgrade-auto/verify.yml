---
# SEC-03 Verify: Upgrade + Auto-Generated Key + FORCE REGENERATION (DIVERGENCE BUG TEST)
#
# Configuration: force_regenerate_masterkey: true
#
# CRITICAL VALIDATIONS:
# 1. All hosts must have the SAME master key (no divergence) ← CRITICAL
# 2. With force_regenerate: true, key MAY change between runs (expected behavior)
# 3. Passwords must be encrypted in configs
# 4. Kafka brokers must be running
#
# The key test: Even with force regeneration, fact-based coordination prevents divergence

- name: Verify - No Master Key Divergence After Upgrade
  hosts: kafka_broker
  gather_facts: false
  tasks:
    - name: Get master key from systemd override on each host
      shell: systemctl cat confluent-kafka 2>/dev/null | grep CONFLUENT_SECURITY_MASTER_KEY | cut -d= -f2 | tr -d '"' || echo "NOT_FOUND"
      register: master_key_output
      changed_when: false
      failed_when: false

    - name: Display master key from each host
      debug:
        msg: "Host {{ inventory_hostname }}: {{ master_key_output.stdout }}"

    - name: Collect all master keys from all hosts
      set_fact:
        all_master_keys: "{{ groups['kafka_broker'] | map('extract', hostvars, 'master_key_output') | map(attribute='stdout') | list }}"
      run_once: true

    - name: Read original master key from file on Ansible controller
      slurp:
        src: generated_ssl_files/masterkey
      delegate_to: localhost
      register: file_key
      run_once: true
      failed_when: false

    - name: Set original key fact
      set_fact:
        original_key: "{{ file_key.content | b64decode | trim }}"
      run_once: true
      when: file_key.content is defined

    - name: Display collected information
      debug:
        msg: |
          ═══════════════════════════════════════════════════════════
          SEC-03: Master Key Divergence Test Results
          ═══════════════════════════════════════════════════════════

          Master keys found:
          {% for host in groups['kafka_broker'] %}
          - {{ host }}: {{ hostvars[host].master_key_output.stdout[:40] if hostvars[host].master_key_output.stdout|length > 40 else hostvars[host].master_key_output.stdout }}...
          {% endfor %}

          Original key from file: {{ original_key[:40] if original_key is defined else 'NOT FOUND' }}...

          Unique keys count: {{ all_master_keys | unique | length }}
          Expected: 1 (no divergence)
          ═══════════════════════════════════════════════════════════
      run_once: true

    # CRITICAL TEST #1: Verify NO divergence across hosts
    - name: "CRITICAL TEST #1: Verify all hosts have the SAME master key"
      assert:
        that:
          - all_master_keys | unique | length == 1
          - all_master_keys[0] | length > 0
          - all_master_keys[0] != "NOT_FOUND"
        fail_msg: |

          ╔═══════════════════════════════════════════════════════════╗
          ║                                                           ║
          ║   ❌❌❌  CRITICAL FAILURE - DIVERGENCE DETECTED  ❌❌❌   ║
          ║                                                           ║
          ╚═══════════════════════════════════════════════════════════╝

          Master keys are DIFFERENT across hosts!

          Found {{ all_master_keys | unique | length }} unique keys:
          {% for host in groups['kafka_broker'] %}
          - {{ host }}: {{ hostvars[host].master_key_output.stdout }}
          {% endfor %}

          This indicates the DIVERGENCE BUG is NOT FIXED!

          Expected: All hosts should have the SAME master key.

          The fix (playbook-level master key generation) is not working.
          Check that:
          1. Master key generation is at playbook level (not role level)
          2. Idempotency check (not masterkey_file_stat.stat.exists) is in place
          3. Role-level fact clearing doesn't clear playbook-set keys

        success_msg: |
          ✅ PASS: All hosts have the same master key
          Master key: {{ all_master_keys[0][:40] }}...
          No divergence detected!
      run_once: true

    # INFO: Check if key was regenerated (expected with force_regenerate_masterkey: true)
    - name: "INFO: Check if master key was regenerated"
      debug:
        msg: |
          ═══════════════════════════════════════════════════════════
          Force Regeneration Status
          ═══════════════════════════════════════════════════════════

          Configuration: force_regenerate_masterkey: true

          Original key (Run 1): {{ original_key[:40] if original_key is defined else 'NOT FOUND' }}...
          Current key  (Run 2): {{ all_master_keys[0][:40] }}...

          {% if original_key is defined and all_master_keys[0] == original_key %}
          ⚠️  Key NOT regenerated (same as original)
          This is unexpected with force_regenerate_masterkey: true
          {% elif original_key is defined and all_master_keys[0] != original_key %}
          ✅ Key WAS regenerated (different from original)
          This is EXPECTED with force_regenerate_masterkey: true
          {% else %}
          ℹ️  Cannot compare (original key not found)
          {% endif %}

          The critical test is: All hosts have SAME key (no divergence)
          ═══════════════════════════════════════════════════════════
      run_once: true
      when: original_key is defined

    # Additional validation: Verify passwords are encrypted
    - name: Verify passwords are encrypted in server.properties
      shell: grep '${securepass:' /etc/kafka/server.properties | wc -l
      register: encrypted_count
      changed_when: false
      failed_when: false

    - name: Assert passwords are encrypted
      assert:
        that:
          - encrypted_count.stdout | default('0') | int > 0
        fail_msg: |
          ❌ FAIL: No encrypted passwords found in server.properties

          File may not have been encrypted properly.
          Check secrets protection execution logs.

        success_msg: |
          ✅ PASS: Passwords are encrypted
          Found {{ encrypted_count.stdout }} encrypted properties
      when: encrypted_count.stdout is defined

    # Additional validation: Verify Kafka is running
    - name: Check Kafka broker service status
      shell: systemctl is-active confluent-kafka || echo "inactive"
      register: kafka_status
      changed_when: false
      failed_when: false

    - name: Assert Kafka is running
      assert:
        that:
          - kafka_status.stdout == "active"
        fail_msg: |
          ❌ FAIL: Kafka broker is not running
          Status: {{ kafka_status.stdout }}

          Check Kafka logs for startup errors.

        success_msg: |
          ✅ PASS: Kafka broker is running
      when: kafka_status.stdout is defined

    # Additional validation: Verify security.properties file exists
    - name: Verify security.properties file on host
      stat:
        path: /var/ssl/private/kafka-broker-security.properties
      register: security_file_stat

    - name: Assert security.properties exists
      assert:
        that:
          - security_file_stat.stat.exists
        fail_msg: "❌ FAIL: security.properties not found on host"
        success_msg: "✅ PASS: security.properties exists on host"

# Final Summary Report
- name: SEC-03 Test Summary
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display final test results
      debug:
        msg: |

          ╔═══════════════════════════════════════════════════════════╗
          ║                                                           ║
          ║     SEC-03: Upgrade + Auto + FORCE REGENERATION          ║
          ║     Master Key Divergence Bug Test (STRONGEST TEST)      ║
          ║                                                           ║
          ╚═══════════════════════════════════════════════════════════╝

          ✅ CRITICAL TEST PASSED: No divergence detected
          ✅ VALIDATION PASSED: Passwords encrypted
          ✅ VALIDATION PASSED: Kafka brokers running
          ✅ VALIDATION PASSED: Security files in place

          ═══════════════════════════════════════════════════════════

          THE MASTER KEY DIVERGENCE BUG IS FIXED!

          Even with force_regenerate_masterkey: true, all hosts get
          the SAME key. This proves fact-based coordination works!

          What was tested:
          - Run 1 (parallel): All hosts get same key "abc123"
          - Run 2 (serial + force_regenerate): All hosts get SAME NEW key "xyz789"

          Without the fix, Run 2 would generate DIFFERENT keys per host.

          Fix validated:
          - Playbook-level master key generation ✅
          - Fact-based coordination prevents divergence ✅
          - All hosts use same key (even with force regeneration) ✅

          This is the STRONGEST test - if force regeneration doesn't
          diverge, then idempotent behavior definitely won't!

          ═══════════════════════════════════════════════════════════

---
### Three-pass converge for the auto-generated master key flow:
###   Pass 0 (Story 7): secrets_protection_enabled=false. Establish a plaintext
###          baseline cluster. server.properties has no ${securepass:...}
###          references; no security.properties file deployed.
###   Pass 1 (original): secrets_protection_enabled=true (default in
###          molecule.yml) with regenerate_masterkey=true. The role enables
###          secrets protection on the running cluster - this is the
###          plain -> encrypted upgrade.
###   Pass 2 (original): regenerate_masterkey=false. The cluster must reuse
###          the Pass 1 key (no silent regeneration, no encryption drift -
###          ANSIENG-5784 + ANSIENG-5858 regression coverage).
###
### Story 3 (idempotency) and Story 10 (CLI v2 rejection) are checked by
### side_effect.yml after this converge.

- name: Pass 0 - plaintext baseline with secrets protection DISABLED
  import_playbook: confluent.platform.all
  vars:
    secrets_protection_enabled: false

- name: Pass 0 verify - cluster is fully plaintext
  hosts: kafka_broker
  gather_facts: false
  tasks:
    - name: Read broker server.properties at the plaintext baseline
      slurp:
        src: /etc/kafka/server.properties
      register: plain_server_props

    - name: Assert no ${securepass:...} references at the plaintext baseline
      assert:
        that:
          - "'${securepass:' not in (plain_server_props.content | b64decode)"
        fail_msg: >-
          Pass 0 was supposed to leave server.properties plaintext, but a
          ${securepass:...} reference appeared. secrets_protection_enabled:
          false did not propagate.

    - name: kafka-broker-security.properties must NOT exist at plaintext baseline
      stat:
        path: /var/ssl/private/kafka-broker-security.properties
      register: plain_secrets_stat

    - assert:
        that:
          - not plain_secrets_stat.stat.exists
        fail_msg: >-
          security.properties exists on the broker even though
          secrets_protection_enabled: false. The role must not deploy
          a secrets file when the feature is off.

- name: Pass 1 - enable secrets protection on the running cluster (plain -> encrypted)
  import_playbook: confluent.platform.all

- name: Capture master key written by the first pass
  hosts: kafka_broker
  gather_facts: false
  tasks:
    - name: Read broker systemd override.conf
      slurp:
        src: /etc/systemd/system/confluent-server.service.d/override.conf
      register: override_first_pass

    - name: Extract CONFLUENT_SECURITY_MASTER_KEY from override.conf
      set_fact:
        masterkey_first_pass: "{{ (override_first_pass.content | b64decode).split('\n')
          | select('match', '.*CONFLUENT_SECURITY_MASTER_KEY=.*') | list | first
          | regex_search('CONFLUENT_SECURITY_MASTER_KEY=(.+)\"', '\\1') | first }}"

    - name: Assert master key is non-empty after first pass
      assert:
        that:
          - masterkey_first_pass | default('') | length > 0
        fail_msg: "First pass did not populate CONFLUENT_SECURITY_MASTER_KEY on the broker."

    - name: Persist first-pass master key for cross-play comparison
      add_host:
        name: "{{ inventory_hostname }}"
        masterkey_first_pass: "{{ masterkey_first_pass }}"

- name: Clear secrets-protection fact so pass 2 mirrors a fresh ansible-playbook invocation
  hosts: all
  gather_facts: false
  tasks:
    - name: Reset secrets_protection_masterkey before the re-converge
      set_fact:
        secrets_protection_masterkey: ""

- name: Re-converge with regenerate_masterkey false
  import_playbook: confluent.platform.all
  vars:
    regenerate_masterkey: false

- name: Verify master key persisted across the re-run
  hosts: kafka_broker
  gather_facts: false
  tasks:
    - name: Re-read broker systemd override.conf after second pass
      slurp:
        src: /etc/systemd/system/confluent-server.service.d/override.conf
      register: override_second_pass

    - name: Extract CONFLUENT_SECURITY_MASTER_KEY from override.conf (second pass)
      set_fact:
        masterkey_second_pass: "{{ (override_second_pass.content | b64decode).split('\n')
          | select('match', '.*CONFLUENT_SECURITY_MASTER_KEY=.*') | list | first
          | regex_search('CONFLUENT_SECURITY_MASTER_KEY=(.+)\"', '\\1') | first }}"

    - name: Assert master key was not regenerated on the second pass
      assert:
        that:
          - masterkey_first_pass == masterkey_second_pass
        fail_msg: >-
          Master key changed across runs (first={{ masterkey_first_pass }},
          second={{ masterkey_second_pass }}). regenerate_masterkey: false
          must preserve the existing key.

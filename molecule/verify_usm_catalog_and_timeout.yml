---
### Verify playbook for USM catalog snapshot size and HTTP exporter request timeout (SETU-2783)

- name: Verify USM catalog and timeout configs - Kafka Controller
  hosts: kafka_controller
  gather_facts: false
  tasks:
    - name: Import variables role
      import_role:
        name: variables

    - name: Verify _usm.client.request.timeout.ms (Controller)
      import_role:
        name: confluent.test
        tasks_from: check_property.yml
      vars:
        file_path: /etc/controller/server.properties
        property: confluent.telemetry.exporter._usm.client.request.timeout.ms
        expected_value: "60000"
      when: "'usm_agent' in groups"

    - name: Verify _usm.events.client.request.timeout.ms (Controller)
      import_role:
        name: confluent.test
        tasks_from: check_property.yml
      vars:
        file_path: /etc/controller/server.properties
        property: confluent.telemetry.exporter._usm.events.client.request.timeout.ms
        expected_value: "60000"
      when: "'usm_agent' in groups"

    - name: Verify catalog.collector.max.bytes.per.snapshot (Controller)
      import_role:
        name: confluent.test
        tasks_from: check_property.yml
      vars:
        file_path: /etc/controller/server.properties
        property: confluent.catalog.collector.max.bytes.per.snapshot
        expected_value: "52428800"
      when: "'usm_agent' in groups"

- name: Verify USM catalog and timeout configs - Kafka Broker
  hosts: kafka_broker
  gather_facts: false
  tasks:
    - name: Import variables role
      import_role:
        name: variables

    - name: Verify _usm.client.request.timeout.ms (Broker)
      import_role:
        name: confluent.test
        tasks_from: check_property.yml
      vars:
        file_path: /etc/kafka/server.properties
        property: confluent.telemetry.exporter._usm.client.request.timeout.ms
        expected_value: "60000"
      when: "'usm_agent' in groups"

    - name: Verify _usm.events.client.request.timeout.ms (Broker, ZK mode)
      import_role:
        name: confluent.test
        tasks_from: check_property.yml
      vars:
        file_path: /etc/kafka/server.properties
        property: confluent.telemetry.exporter._usm.events.client.request.timeout.ms
        expected_value: "60000"
      when:
        - "'usm_agent' in groups"
        - not kraft_enabled

    - name: Verify catalog.collector.max.bytes.per.snapshot (Broker, ZK mode)
      import_role:
        name: confluent.test
        tasks_from: check_property.yml
      vars:
        file_path: /etc/kafka/server.properties
        property: confluent.catalog.collector.max.bytes.per.snapshot
        expected_value: "52428800"
      when:
        - "'usm_agent' in groups"
        - not kraft_enabled

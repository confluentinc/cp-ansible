---
### Asserts the customer-supplied master key reached every component
### (controller + all brokers) and that secrets protection took effect.

# KRaft only: the kafka_controller carries CONFLUENT_SECURITY_MASTER_KEY in its
# systemd override. In ZK mode this group is empty and the play no-ops -
# ZooKeeper deliberately gets no master key, so there is no controller key to
# compare against (see the guarded assertion in the broker play below).
- name: Capture controller master key for cross-component comparison
  hosts: kafka_controller
  gather_facts: false
  tasks:
    - name: Read controller systemd override.conf
      slurp:
        src: /etc/systemd/system/confluent-kcontroller.service.d/override.conf
      register: controller_override

    - name: Extract CONFLUENT_SECURITY_MASTER_KEY from controller override.conf
      set_fact:
        controller_masterkey: "{{ (controller_override.content | b64decode).split('\n')
          | select('match', '.*CONFLUENT_SECURITY_MASTER_KEY=.*') | list | first
          | regex_search('CONFLUENT_SECURITY_MASTER_KEY=(.+)\"', '\\1') | first }}"

    - name: Assert controller master key is non-empty
      assert:
        that:
          - controller_masterkey | default('') | length > 0
        fail_msg: "Controller has no CONFLUENT_SECURITY_MASTER_KEY in override.conf."

- name: Verify - kafka_broker secrets protection (customer-provided)
  hosts: kafka_broker
  gather_facts: false
  tasks:
    - name: security.properties deployed on broker
      stat:
        path: /var/ssl/private/kafka-broker-security.properties
      register: secrets_file_stat

    - assert:
        that:
          - secrets_file_stat.stat.exists
        fail_msg: "security.properties missing on broker - customer-provided file was not copied (regression of ANSIENG-5857)."

    - import_role:
        name: confluent.test
        tasks_from: check_property.yml
      vars:
        file_path: /etc/kafka/server.properties
        property: ssl.keystore.password
        expected_value: ${securepass:/var/ssl/private/kafka-broker-security.properties:server.properties/ssl.keystore.password}

    - name: Read broker systemd override.conf
      slurp:
        src: /etc/systemd/system/confluent-server.service.d/override.conf
      register: broker_override

    - name: Extract CONFLUENT_SECURITY_MASTER_KEY from broker override.conf
      set_fact:
        broker_masterkey: "{{ (broker_override.content | b64decode).split('\n')
          | select('match', '.*CONFLUENT_SECURITY_MASTER_KEY=.*') | list | first
          | regex_search('CONFLUENT_SECURITY_MASTER_KEY=(.+)\"', '\\1') | first }}"

    - name: Assert master key is present on broker
      assert:
        that:
          - broker_masterkey | default('') | length > 0
        fail_msg: "CONFLUENT_SECURITY_MASTER_KEY is missing from {{ inventory_hostname }}'s override.conf."

    - name: Assert all brokers carry the same master key
      assert:
        that:
          - broker_masterkey == hostvars[groups['kafka_broker'][0]].broker_masterkey
        fail_msg: >-
          Broker {{ inventory_hostname }} has a different master key than
          {{ groups['kafka_broker'][0] }} - regenerate_masterkey: false with
          secrets_protection_masterkey provided must deliver the same key to
          every broker.

    # KRaft only: ZooKeeper carries no master key, so there is nothing to
    # compare against in ZK mode (skipped when the kafka_controller group is empty).
    - name: Assert broker master key matches controller's (customer-provided value reached every component)
      assert:
        that:
          - broker_masterkey == hostvars[groups['kafka_controller'][0]].controller_masterkey
        fail_msg: >-
          Broker {{ inventory_hostname }} master key differs from the controller's.
          The customer-provided secrets_protection_masterkey must be applied
          uniformly across controller and brokers; per-component regeneration
          is a regression.
      when: groups['kafka_controller'] | default([]) | length > 0

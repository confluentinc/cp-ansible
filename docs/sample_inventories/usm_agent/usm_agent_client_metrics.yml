---
### USM Client Metrics Configuration
##
## The following is an example inventory file for enabling USM Client Metrics
## on Confluent Platform components (Kafka Broker, Kafka Controller/KRaft).
##
## When usm_client_metrics_enabled is set to true, the following telemetry properties
## are configured on Kafka Broker and Kafka Controller:
##   - confluent.telemetry.external.client.metrics.usm.push.enabled: true
##   - confluent.telemetry.external.client.metrics.push.enabled: true
##   - confluent.telemetry.external.client.metrics.delta.temporality: true
##   - confluent.telemetry.external.client.metrics.subscription.interval.ms.list: 60000
##   - confluent.telemetry.external.client.metrics.subscription.metrics.list: (consumer and producer metrics)
##
## IMPORTANT: usm_client_metrics_enabled is mutually exclusive with
## control_center_next_gen_client_metrics_enabled. You cannot enable both at the same time.

all:
  vars:
    ansible_connection: ssh
    ansible_user: ec2-user
    ansible_become: true
    ansible_ssh_private_key_file: /home/ec2-user/guest.pem

    # SSL Configuration (for Kafka components)
    ssl_enabled: true
    ssl_mutual_auth_enabled: true

    # USM Agent Configuration - CCloud
    ccloud_endpoint: "https://api.confluent.cloud:443"
    ccloud_environment_id: env-abc123
    ccloud_credential:
      username: "your-ccloud-api-key"
      password: "your-ccloud-api-secret"

    # USM Agent Authentication Configuration
    usm_agent_basic_auth_enabled: true
    usm_agent_ssl_enabled: true
    usm_agent_ssl_mutual_auth_enabled: false
    usm_agent_client_username: "usm-user"
    usm_agent_client_password: "usm-secret"

    # ===========================================================
    # USM Client Metrics Configuration
    # ===========================================================
    # Enable USM client metrics for Kafka Broker and Kafka Controller (KRaft)
    # This enables external client metrics to be pushed to USM
    usm_client_metrics_enabled: true

    # IMPORTANT: If using Control Center Next Gen, ensure the following is false
    # (cannot be enabled simultaneously with usm_client_metrics_enabled)
    # control_center_next_gen_client_metrics_enabled: false

usm_agent:
  hosts:
    usm-agent1.confluent.io:

kafka_controller:
  hosts:
    controller1.confluent.io:

kafka_broker:
  hosts:
    kfk[01:03].confluent.io:

schema_registry:
  hosts:
    schema-registry1.confluent.io:

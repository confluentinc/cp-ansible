---
# System Information Collection Task
# Collects all system information into a single consolidated file

- name: Collect system information via shell commands
  shell: |
    echo "=== JAVA VERSION ==="
    java -version 2>&1
    echo ""
    echo "=== MEMORY INFORMATION ==="
    free -h 2>&1
    echo ""
    cat /proc/meminfo 2>/dev/null || true
  args:
    executable: "{{ shell_executable }}"
  register: system_info_output

- name: Save consolidated system information to file
  copy:
    content: |
      === SYSTEM INFORMATION ===
      Hostname: {{ inventory_hostname }}
      OS Family: {{ ansible_os_family }}
      Distribution: {{ ansible_distribution }} {{ ansible_distribution_version }}
      Kernel: {{ ansible_kernel }}
      Architecture: {{ ansible_architecture }}
      Memory (MB): {{ ansible_memtotal_mb }}
      Processor Count: {{ ansible_processor_count }}
      Processor Cores: {{ ansible_processor_cores }}
      Python Version: {{ ansible_python_version }}
      Ansible Version: {{ ansible_version.full }}

      {{ system_info_output.stdout }}
    dest: "{{ host_bundle_dir }}/system/system_info.txt"
    mode: '0644'
  delegate_to: localhost
  vars:
    ansible_connection: local
    ansible_become: false

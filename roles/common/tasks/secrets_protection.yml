---
- name: Validate CLI version for secrets protection
  assert:
    that:
      - confluent_cli_version is version('3.0.0', '>=')
    fail_msg: |
      Secrets protection requires Confluent CLI v3.0.0 or higher.
      Current version: {{ confluent_cli_version }}
      CLI v2.x reached end of support (see
      https://support.confluent.io/hc/en-us/articles/31743484026260-Deprecation-Notice-for-Confluent-CLI-v2-and-Confluent-Terraform-Provider-v1).
      Please upgrade to CLI v3.0+.

- name: Empty master key fact when regenerate_masterkey
  set_fact:
    secrets_protection_masterkey: ""
  when:
    - regenerate_masterkey|bool
    - not (secrets_protection_masterkey_provided | default(false) | bool)

- name: Set Up Secrets Protection
  include_tasks: masterkey.yml
  run_once: true
  when:
    - secrets_protection_enabled|bool
    - not secrets_protection_masterkey
    - regenerate_masterkey|bool
  tags: masterkey

- name: Check if Config Exists ownership
  stat:
    path: "{{ config_path }}"
  register: config_stat

- name: Create Config Backup
  copy:
    src: "{{ config_path }}"
    dest: "{{ config_path }}-backup"
    remote_src: true
    mode: '640'
    owner: "{{ secrets_file_owner }}"
    group: "{{ secrets_file_group }}"
  when: config_stat.stat.exists

- name: Create Unmasked Config
  template:
    src: properties.j2
    dest: "{{ config_path }}"
    mode: '640'
    owner: "{{ secrets_file_owner }}"
    group: "{{ secrets_file_group }}"
  vars:
    # Secrets Protection CLI needs all backslashes escaped by another backslash. This filter turns \ into \\.
    properties: '{{ final_properties | regex_replace("\\", "\\\\") }}' # noqa var-naming
  diff: "{{ not mask_sensitive_diff|bool }}"

- name: Create Secrets Protection Directory
  file:
    path: "{{ ssl_file_dir_final }}"
    state: directory
    mode: '755'
  tags:
    - filesystem
    - privileged

- name: Copy security.properties file to Host
  copy:
    src: "{{ secrets_protection_security_file }}"
    dest: "{{ secrets_file }}"
    owner: "{{ secrets_file_owner }}"
    group: "{{ secrets_file_group }}"
    mode: '640'
  diff: "{{ not mask_sensitive_diff|bool }}"
  when: regenerate_masterkey|bool or secrets_protection_masterkey_provided | default(false) | bool

- name: Read existing master key from this component's own override.conf
  include_tasks: get_masterkey.yml
  vars:
    systemd_override_path: "{{ component_systemd_override }}"
  when:
    - not regenerate_masterkey|bool
    - not (secrets_protection_masterkey_provided | default(false) | bool)
    - not secrets_protection_masterkey
    - component_systemd_override | default('') | length > 0

- name: Use master key from this component's override.conf
  set_fact:
    secrets_protection_masterkey: "{{ existing_masterkey }}"
  no_log: "{{ mask_secrets|bool }}"
  when:
    - not secrets_protection_masterkey
    - existing_masterkey is defined
    - existing_masterkey | length > 0

- name: Load masterkey
  slurp:
    src: generated_ssl_files/masterkey
  delegate_to: localhost
  vars:
    ansible_connection: local
    ansible_become: "{{ ansible_become_localhost }}"
  no_log: "{{mask_secrets|bool}}"
  register: slurped_masterkey
  when: not secrets_protection_masterkey

- name: Save Master Encryption Key
  set_fact:
    secrets_protection_masterkey: "{{ slurped_masterkey.content|b64decode}}"
  no_log: "{{mask_secrets|bool}}"
  when: not secrets_protection_masterkey

- name: Expose current master key as existing_masterkey for downstream consumers
  set_fact:
    existing_masterkey: "{{ secrets_protection_masterkey }}"
  no_log: "{{ mask_secrets|bool }}"
  when: secrets_protection_masterkey | default('') | length > 0

- name: Create Encrypt Properties List
  set_fact:
    final_encrypt_properties: "{{ (final_properties | dict2items | map(attribute='key') | select('match', properties_patterns|join('|'))
      | list +  encrypt_properties) | unique if encrypt_passwords|bool else encrypt_properties }}"
  vars:
    properties_patterns:
      - '.*password.*'
      - '.*basic.auth.user.info.*'
      - '^ldap.java.naming.security.credentials$'
      - '^confluent.license$'
      - '.*sasl.jaas.config'

- name: Debug Properties to Mask
  debug:
    var: final_encrypt_properties
  run_once: true

- name: Encrypt Properties
  shell: |
    {{ confluent_cli_path }} secret file encrypt --config-file {{ config_path }} \
      --local-secrets-file {{ secrets_file }} \
      --remote-secrets-file {{ secrets_file }} \
      --config "{{ final_encrypt_properties | join (',') }}"
  environment:
    CONFLUENT_SECURITY_MASTER_KEY: "{{ secrets_protection_masterkey }}"
  changed_when: true
  when: final_encrypt_properties|length > 0

# If config is different than the backup, need to restart
- name: Test for Config File Changes from Backup - Trigger Handler
  copy:
    src: "{{ config_path }}"
    dest: "{{ config_path }}-backup"
    remote_src: true
    mode: '640'
    owner: "{{ secrets_file_owner }}"
    group: "{{ secrets_file_group }}"
  notify: "{{handler}}"
  when: config_stat.stat.exists

- name: Remove Backup Config
  file:
    path: "{{ config_path }}-backup"
    state: absent
  when: config_stat.stat.exists

- name: First Time Creating Config - Trigger Handler
  command: /bin/true
  notify: "{{handler}}"
  when: not config_stat.stat.exists
  changed_when: false

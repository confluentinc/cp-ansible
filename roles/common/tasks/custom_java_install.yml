# Checks for custom_java_path in centos7, debian9, debian10
# Installs the custom Java provided

---
- name: Check custom_java_path in Debian
  fail:
    msg: "{{ debian_java_package_name }} is not available in default Java repository for {{ansible_os_family}} {{ansible_distribution_major_version}}. You can have Java preconfigured on managed nodes and provide the Java Path under custom_java_path. Alternatively, you may use any available java for your OS."
  when:
    - install_java|bool
    - debian_java_package_name in ['openjdk-21-jdk', 'openjdk-25-jdk']
    - ansible_os_family == "Debian" and ansible_distribution_major_version in ['12']

- name: Check custom_java_path in Ubuntu 20.04
  fail:
    msg: "{{ ubuntu_java_package_name }} is not available in default Java repository for {{ansible_distribution}} {{ansible_distribution_version}}. You can have Java preconfigured on managed nodes and provide the Java Path under custom_java_path. Alternatively, you may use any available java for your OS."
  when:
    - install_java|bool
    - ubuntu_java_package_name in ['openjdk-25-jdk']
    - ansible_distribution == "Ubuntu" and ansible_distribution_major_version in ['20']

- name: Java Update Alternatives
  alternatives:
    name: java
    link: /usr/bin/java
    path: "{{custom_java_path}}/bin/java"
    priority: 1
  when: not install_java|bool

- name: Keytool Update Alternatives
  alternatives:
    name: keytool
    link: /usr/bin/keytool
    path: "{{custom_java_path}}/bin/keytool"
    priority: 1
  when: not install_java|bool

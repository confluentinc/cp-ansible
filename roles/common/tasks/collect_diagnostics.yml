- name: Clean up remote diagnostics temp files
  file:
    path: "/tmp/{{ item }}_{{ inventory_hostname }}.txt"
    state: absent
  loop:
    - service_status
    - processes
  ignore_errors: true

- name: Clean up remote journalctl temp file
  file:
    path: "/tmp/journalctl_{{ inventory_hostname }}.log"
    state: absent
  ignore_errors: true

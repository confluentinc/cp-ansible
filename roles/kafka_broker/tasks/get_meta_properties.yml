---
- name: Extract ClusterId from meta.properties on KRaft Controller
  slurp:
    src: "{{ kafka_controller_final_properties['log.dirs'] }}/meta.properties"
  delegate_to: "{{ groups.kafka_controller[0] }}"
  register: uuid_broker

# existing_masterkey is populated by common/tasks/secrets_protection.yml
# (which runs earlier in the broker play and exposes
# secrets_protection_masterkey under that name for downstream consumers).
# No second slurp of override.conf is needed here.
- name: Format Storage Directory
  command: "{{ binary_base_path }}/bin/kafka-storage format -t={{ clusterid }} -c {{ kafka_broker.config_file }} --ignore-formatted"
  environment: "{{ {'CONFLUENT_SECURITY_MASTER_KEY': existing_masterkey} if kafka_broker_secrets_protection_enabled|bool and existing_masterkey | default('') != '' else {} }}"
  register: format_meta
  changed_when: format_meta.rc == 0
  no_log: "{{mask_secrets|bool}}"
  vars:
    clusterid: "{{ (uuid_broker['content'] | b64decode).partition('cluster.id=')[2].partition('\n')[0] }}"

---
# Per-role wrapper that funnels both broker and broker-client configs through
# the shared common/tasks/secrets_protection.yml, then writes override.conf
# with the master key the include just settled into
# secrets_protection_masterkey.
#
# Differences vs the 7.5.x baseline:
#   - "Empty master key fact when regenerate_masterkey" (added by PR #2158) is
#     removed - it broke wiki Scenario 4 (regen=true + customer-supplied)
#     without solving any real problem in production. With it gone, the
#     customer's value is preserved naturally.
#   - The `when:` on each include drops the `rbac_enabled|bool or` legacy
#     carve-out, leaving the single CLI v3.0+ requirement. CLI v2 is past EOS.

- name: Create Kafka Broker Config with Secrets Protection
  include_role:
    name: common
    tasks_from: secrets_protection.yml
  vars:
    final_properties: "{{ kafka_broker_final_properties }}"
    encrypt_passwords: "{{ kafka_broker_secrets_protection_encrypt_passwords }}"
    encrypt_properties: "{{ kafka_broker_secrets_protection_encrypt_properties }}"
    config_path: "{{ kafka_broker.config_file }}"
    secrets_file: "{{ kafka_broker_secrets_protection_file }}"
    secrets_file_owner: "{{ kafka_broker_user }}"
    secrets_file_group: "{{ kafka_broker_group }}"
    ca_cert_path: "{{ kafka_broker_ca_cert_path if ssl_enabled|bool else '' }}"
    handler: "restart kafka"
  tags:
    - configuration
  when:
    - kafka_broker_secrets_protection_enabled|bool
    - confluent_cli_version is version('3.0.0', '>=')

- name: Create Kafka Broker Client Config with Secrets Protection
  include_role:
    name: common
    tasks_from: secrets_protection.yml
  vars:
    final_properties: "{{ kafka_broker_client_properties }}"
    encrypt_passwords: "{{ kafka_broker_client_secrets_protection_encrypt_passwords }}"
    encrypt_properties: "{{ kafka_broker_client_secrets_protection_encrypt_properties }}"
    config_path: "{{ kafka_broker.client_config_file}}"
    secrets_file: "{{ kafka_broker_client_secrets_protection_file }}"
    secrets_file_owner: "{{ kafka_broker_user }}"
    secrets_file_group: "{{ kafka_broker_group }}"
    ca_cert_path: "{{ kafka_broker_ca_cert_path if ssl_enabled|bool else '' }}"
    handler: "restart kafka"
  tags:
    - configuration
  when:
    - kafka_broker_client_secrets_protection_enabled|bool
    - confluent_cli_version is version('3.0.0', '>=')

# override.conf is templated by `Write Service Overrides` in
# kafka_broker/tasks/main.yml after this wrapper returns. By the time that
# task runs, secrets_protection_masterkey has been populated by the
# include_role calls above, so override.conf is written exactly once per
# converge with the correct CONFLUENT_SECURITY_MASTER_KEY value. We do NOT
# template override.conf inside this wrapper - a duplicate write would
# reintroduce the pre-#2158 double-restart pattern.

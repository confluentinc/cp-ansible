---
- name: Ensure old and new mTLS variables are consistent
  include_tasks: mtls.yml

- name: Validate that usm_client_metrics_enabled is not enabled for Connect
  assert:
    that:
      - not usm_client_metrics_enabled
    fail_msg: |
      ERROR: usm_client_metrics_enabled is not supported for Connect.
      This field is only supported for Kafka Broker and Kafka Controller (KRaft).
      Please set usm_client_metrics_enabled: false or remove it from your Connect configuration.
    success_msg: "USM client metrics validation passed for Connect"
  when:
    - usm_client_metrics_enabled is defined
    - usm_client_metrics_enabled
    - "'kafka_connect' in groups"
    - inventory_hostname in groups.kafka_connect
  tags:
    - validation
    - usm_client_metrics_validation

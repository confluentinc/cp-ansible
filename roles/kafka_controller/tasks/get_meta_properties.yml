---
- name: Get ClusterId
  command: "{{ binary_base_path }}/bin/kafka-storage random-uuid"
  environment:
    KAFKA_OPTS: "-Xlog:all=error -XX:+IgnoreUnrecognizedVMOptions"
  register: uuid_key
  changed_when: false
  run_once: true

# existing_masterkey is populated by common/tasks/secrets_protection.yml
# (which runs earlier in the controller play and exposes
# secrets_protection_masterkey under that name for downstream consumers).
# No second slurp of override.conf is needed here.
- name: Format Data Directory
  command: "{{ binary_base_path }}/bin/kafka-storage format -t={{ clusterid }} -c {{ kafka_controller.config_file }} --ignore-formatted"
  environment: "{{ {'CONFLUENT_SECURITY_MASTER_KEY': existing_masterkey} if kafka_controller_secrets_protection_enabled|bool and existing_masterkey | default('') != '' else {} }}"
  register: format_meta
  changed_when: format_meta.rc == 0
  no_log: "{{mask_secrets|bool}}"
  vars:
    clusterid: "{{ uuid_key.stdout }}"

---
# Per-role wrapper that funnels the controller config through the shared
# common/tasks/secrets_protection.yml, then writes override.conf with the
# master key the include just settled into secrets_protection_masterkey.
#
# Differences vs the 7.5.x baseline:
#   - The slurp + properties_dict + controller_final_properties hack at the
#     top of the 7.5.x file is removed. That hack supported a CLI v2 flow
#     where the broker delegated controller secrets encryption through
#     itself; CLI v3+ removed the MDS-login dependency, so the controller
#     just encrypts its own properties using kafka_controller_final_properties.
#   - The `when:` on the include drops the `rbac_enabled|bool or` legacy
#     carve-out, leaving the single CLI v3.0+ requirement.

- name: Create Kafka Controller Config with Secrets Protection
  include_role:
    name: common
    tasks_from: secrets_protection.yml
  vars:
    final_properties: "{{ kafka_controller_final_properties }}"
    encrypt_passwords: "{{ kafka_controller_secrets_protection_encrypt_passwords }}"
    encrypt_properties: "{{ kafka_controller_secrets_protection_encrypt_properties }}"
    config_path: "{{ kafka_controller.config_file }}"
    secrets_file: "{{ kafka_controller_secrets_protection_file }}"
    secrets_file_owner: "{{ kafka_controller_user }}"
    secrets_file_group: "{{ kafka_controller_group }}"
    ca_cert_path: "{{ kafka_controller_ca_cert_path if ssl_enabled|bool else '' }}"
    handler: "restart Kafka Controller"
  tags:
    - configuration
  when:
    - kafka_controller_secrets_protection_enabled|bool
    - confluent_cli_version is version('3.0.0', '>=')

# override.conf is templated by `Write Service Overrides` in
# kafka_controller/tasks/main.yml after this wrapper returns. By the time
# that task runs, secrets_protection_masterkey has been populated by the
# include_role call above, so override.conf is written exactly once per
# converge with the correct CONFLUENT_SECURITY_MASTER_KEY value. We do NOT
# template override.conf inside this wrapper - a duplicate write would
# reintroduce the pre-#2158 double-restart pattern.
